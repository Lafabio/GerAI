<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Provas</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
/* ── DOCX LIB (docx.js bundled inline – omitted here, loaded from CDN below) ── */
</script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.js"></script>
<style>
:root{--bg:#eeebe6;--sf:#faf9f7;--card:#fff;--br:#d4cfc6;--brs:#a5a09a;--tx:#1a1916;--mu:#7a7570;--ac:#1d4ed8;--acbg:#eff6ff;--dn:#b91c1c;--ok:#166534;--wn:#92400e;--wnbg:#fef9c3;--r:8px;--sh:0 1px 3px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.topbar{background:var(--ac);color:#fff;padding:0 18px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.tb-brand{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.tb-acts{display:flex;gap:6px}
.tbtn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);color:#fff;font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:600;padding:5px 12px;border-radius:6px;cursor:pointer;transition:background .2s}
.tbtn:hover{background:rgba(255,255,255,.26)}
.tbtn.prime{background:#fff;color:var(--ac)}
.tbtn.prime:hover{background:#e0eaff}
.tbtn:disabled{opacity:.5;cursor:not-allowed}
.app{display:grid;grid-template-columns:295px 1fr;min-height:calc(100vh - 50px)}
.sb{background:var(--sf);border-right:1px solid var(--br);padding:13px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:13px}
.sb-s{display:flex;flex-direction:column;gap:7px}
.slbl{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);padding-bottom:4px;border-bottom:1px solid var(--br)}
.fl{display:flex;flex-direction:column;gap:3px}
.fl label{font-size:10.5px;font-weight:600;color:var(--mu)}
.fl input,.fl select,.fl textarea{font-family:'IBM Plex Sans',sans-serif;font-size:12px;background:var(--card);border:1px solid var(--br);color:var(--tx);padding:6px 8px;border-radius:6px;width:100%;transition:border-color .2s}
.fl input:focus,.fl select:focus,.fl textarea:focus{outline:none;border-color:var(--ac)}
.fl textarea{resize:vertical;min-height:50px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.tipo-tg{display:flex;background:var(--bg);border:1px solid var(--br);border-radius:6px;overflow:hidden}
.tipo-tg button{flex:1;border:none;background:transparent;font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:600;padding:7px 4px;cursor:pointer;color:var(--mu);transition:all .2s}
.tipo-tg button.active{background:var(--ac);color:#fff}
.cad-list{display:flex;flex-direction:column;gap:4px;max-height:110px;overflow-y:auto}
.cad-item{display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--br);border-radius:5px;padding:4px 8px;font-size:11px}
.cad-item span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cad-del{background:none;border:none;color:var(--dn);cursor:pointer;font-size:12px;font-weight:700;padding:0 3px}
.cad-row{display:flex;gap:5px;margin-top:2px}
.cad-row input{flex:1;font-family:'IBM Plex Sans',sans-serif;font-size:11px;border:1px solid var(--br);background:var(--card);color:var(--tx);padding:5px 8px;border-radius:5px}
.cad-row input:focus{outline:none;border-color:var(--ac)}
.cad-btn{background:var(--ac);color:#fff;border:none;font-size:11px;font-weight:700;padding:5px 9px;border-radius:5px;cursor:pointer;white-space:nowrap}
.logo-area{border:2px dashed var(--br);border-radius:6px;padding:9px;text-align:center;cursor:pointer;background:var(--bg);transition:all .2s;position:relative;min-height:52px;display:flex;align-items:center;justify-content:center}
.logo-area:hover{border-color:var(--ac);background:var(--acbg)}
.logo-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
.logo-area p{font-size:10px;color:var(--mu);pointer-events:none}
.logo-area img{max-width:100%;max-height:52px;object-fit:contain;pointer-events:none}
.cal-wrap{position:relative;width:100%}
.cal-btn{width:100%;font-family:'IBM Plex Sans',sans-serif;font-size:12px;background:var(--card);border:1px solid var(--br);color:var(--tx);padding:6px 8px;border-radius:6px;cursor:pointer;text-align:left;transition:border-color .2s}
.cal-btn:hover{border-color:var(--ac)}
.cal-pop{position:absolute;top:calc(100% + 4px);left:0;background:var(--card);border:1px solid var(--br);border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,.14);z-index:400;padding:10px;width:218px;display:none}
.cal-pop.open{display:block}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.cal-nav button{background:var(--bg);border:1px solid var(--br);border-radius:5px;width:22px;height:22px;cursor:pointer;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center}
.cal-nav button:hover{background:var(--acbg);border-color:var(--ac)}
.cal-my{font-size:12px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-lbl{font-size:8.5px;font-weight:700;color:var(--mu);text-align:center;padding:2px 0}
.cal-d{font-size:11px;text-align:center;padding:4px 1px;border-radius:4px;cursor:pointer;transition:all .15s}
.cal-d:hover{background:var(--acbg);color:var(--ac)}
.cal-d.sel{background:var(--ac);color:#fff;font-weight:700}
.cal-d.today{background:var(--acbg);font-weight:700;color:var(--ac)}
.cal-d.other-m{color:#ccc}
.editor{padding:18px;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.pts-bar{max-width:880px;margin:0 auto 12px;background:var(--card);border:1px solid var(--br);border-radius:var(--r);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;font-size:12px;box-shadow:var(--sh)}
.ptot{font-weight:700;font-size:14px;color:var(--ac)}
.pwarn{color:var(--dn);font-size:11px;display:none}
.qw{max-width:880px;margin:0 auto 11px;padding:13px 15px;border:1px solid var(--br);border-radius:var(--r);background:var(--card);box-shadow:var(--sh);position:relative}
.qw:hover .qctrl{opacity:1}
.qtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.qnum{font-size:12px;font-weight:700;color:var(--ac)}
.qctrl{opacity:0;transition:opacity .2s;display:flex;gap:4px}
.qb{background:var(--bg);border:1px solid var(--br);color:var(--mu);font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:5px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .2s}
.qb:hover{background:var(--br)}
.qb.del:hover{background:#fee2e2;border-color:#fca5a5;color:var(--dn)}
.qb.mv:hover{background:var(--acbg);border-color:var(--ac);color:var(--ac)}
.qtipo{display:flex;gap:5px;margin-bottom:9px;flex-wrap:wrap;align-items:center}
.qtipo span{font-size:10px;font-weight:700;color:var(--mu)}
.qtbtn{border:1px solid var(--br);background:var(--bg);font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:20px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;color:var(--mu);transition:all .2s}
.qtbtn.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.qf{margin-bottom:7px}
.qf>label{font-size:10px;font-weight:700;color:var(--mu);display:block;margin-bottom:3px;letter-spacing:.05em;text-transform:uppercase}
.qf textarea,.qf input[type=text]{width:100%;font-family:'IBM Plex Sans',sans-serif;font-size:12px;border:1px solid var(--br);background:var(--bg);color:var(--tx);padding:6px 8px;border-radius:6px;resize:vertical}
.qf textarea{min-height:40px}
.qf textarea:focus,.qf input:focus{outline:none;border-color:var(--ac);background:#fff}
.imgdrop{border:2px dashed var(--br);border-radius:6px;padding:9px;text-align:center;cursor:pointer;position:relative;background:var(--bg);transition:all .2s}
.imgdrop:hover{border-color:var(--ac);background:var(--acbg)}
.imgdrop input{position:absolute;inset:0;opacity:0;cursor:pointer}
.imgdrop p{font-size:10px;color:var(--mu);pointer-events:none}
.imgdrop img{max-width:100%;max-height:140px;border-radius:4px;pointer-events:none}
.img-rm{background:#fee2e2;border:1px solid #fca5a5;color:var(--dn);font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;margin-top:4px}
.alts{display:flex;flex-direction:column;gap:5px;margin-top:4px}
.alt-row{display:flex;align-items:center;gap:7px}
.alt-l{font-size:11.5px;font-weight:700;color:var(--ac);width:17px;flex-shrink:0}
.alt-in{flex:1;font-family:'IBM Plex Sans',sans-serif;font-size:12px;border:1px solid var(--br);background:var(--bg);color:var(--tx);padding:5px 8px;border-radius:5px}
.alt-in:focus{outline:none;border-color:var(--ac);background:#fff}
.alt-radio{width:14px;height:14px;accent-color:var(--ok);cursor:pointer}
.alt-rl{font-size:9px;color:var(--mu)}
/* ── SOMATÓRIA ── */
.somat{display:flex;flex-direction:column;gap:5px;margin-top:4px}
.somat-r{display:flex;align-items:center;gap:7px}
.somat-v{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--wn);width:28px;text-align:right;flex-shrink:0}
.somat-in{flex:1;font-family:'IBM Plex Sans',sans-serif;font-size:12px;border:1px solid var(--br);background:var(--bg);color:var(--tx);padding:5px 8px;border-radius:5px}
.somat-in:focus{outline:none;border-color:var(--ac);background:#fff}
.somat-cb{width:14px;height:14px;accent-color:var(--ok);cursor:pointer}
.somat-hint{font-size:10.5px;color:var(--wn);background:var(--wnbg);padding:5px 9px;border-radius:5px;margin-top:5px}
.somat-btns{display:flex;gap:6px;margin-top:6px}
.somat-add{background:var(--ac);color:#fff;border:none;font-size:11px;font-weight:700;padding:4px 10px;border-radius:5px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif}
.somat-rem{background:#fee2e2;border:1px solid #fca5a5;color:var(--dn);font-size:11px;font-weight:700;padding:4px 10px;border-radius:5px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif}
.somat-add:hover{background:#1e40af}
.somat-rem:hover{background:#fecaca}
/* ── PREVIEW QUESTÃO ── */
.q-preview-header{font-family:Arial,sans-serif;font-size:10.5pt;font-weight:bold;margin-bottom:4px;display:flex;gap:6px;align-items:baseline}
.q-preview-header .q-num-lbl{color:var(--ac);font-size:11px}
.pts-in{width:46px;font-family:'IBM Plex Sans',sans-serif;font-size:11px;border:1px solid var(--br);border-radius:5px;padding:2px 5px;text-align:center}
.add-btn{width:100%;max-width:880px;margin:0 auto 8px;padding:11px;border:2px dashed var(--br);border-radius:var(--r);background:transparent;font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:600;color:var(--mu);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.add-btn:hover{border-color:var(--ac);color:var(--ac);background:var(--acbg)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:18px;overflow-y:auto}
.modal-ov.hidden{display:none!important}
.modal-box{background:#fff;border-radius:10px;max-width:860px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-hd{padding:13px 18px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.modal-hd h2{font-size:13px;font-weight:700}
.modal-hd button{background:var(--bg);border:1px solid var(--br);font-size:11px;font-weight:600;padding:4px 10px;border-radius:5px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif}
.modal-bd{padding:18px;max-height:78vh;overflow-y:auto;font-family:Arial,sans-serif;font-size:11pt}
.print-area{background:white;padding:10mm;max-width:210mm;margin:0 auto;box-sizing:border-box}
@media print{
  .no-print{display:none}
  .print-area{margin:0;padding:10mm;width:100%}
}
</style>
</head>
<body>

<div class="topbar no-print">
  <div class="tb-brand">📋 Gerador de Provas</div>
  <div class="tb-acts">
    <button class="tbtn" onclick="openPreview()">👁 Pré-visualizar</button>
    <button class="tbtn prime" id="btnExport" onclick="exportPDF()">📄 Exportar PDF</button>
    <button class="tbtn prime" id="btnDocx" onclick="exportDOCX()">📝 Exportar DOCX</button>
    <button class="tbtn" onclick="window.print()">🖨️ Imprimir</button>
  </div>
</div>

<div class="app">
<aside class="sb no-print">

  <div class="sb-s">
    <div class="slbl">Escola</div>
    <div class="fl"><label>Nome da Escola</label><input id="nomeEscola" placeholder="Ex: Colégio Municipal..." oninput="autoSave()"></div>
    <div class="fl"><label>Cidade / UF</label><input id="cidadeEscola" placeholder="Ex: Tubarão – SC" oninput="autoSave()"></div>
    <div class="fl"><label>Logo</label>
      <div class="logo-area" onclick="document.getElementById('logoInput').click()">
        <input type="file" id="logoInput" accept="image/*" onchange="loadLogo(this)" style="display:none">
        <img id="logoImg" style="display:none"><p id="logoHint">📷 Clique para adicionar logo</p>
      </div>
    </div>
  </div>

  <div class="sb-s">
    <div class="slbl">Cadastro de Professores</div>
    <div class="cad-list" id="profList"></div>
    <div class="cad-row">
      <input type="text" id="profNovo" placeholder="Nome do(a) professor(a)…" onkeydown="if(event.key==='Enter')addProf()">
      <button class="cad-btn" onclick="addProf()">+ Add</button>
    </div>
  </div>

  <div class="sb-s">
    <div class="slbl">Cadastro de Disciplinas</div>
    <div class="cad-list" id="discList"></div>
    <div class="cad-row">
      <input type="text" id="discNova" placeholder="Nome da disciplina…" onkeydown="if(event.key==='Enter')addDisc()">
      <button class="cad-btn" onclick="addDisc()">+ Add</button>
    </div>
  </div>

  <div class="sb-s">
    <div class="slbl">Dados da Avaliação</div>
    <div class="fl"><label>Título</label><input id="tituloAval" placeholder="Ex: AVALIAÇÃO MENSAL 1" oninput="autoSave()"></div>
    <div class="fl"><label>Professor(a)</label><select id="selProf" onchange="autoSave()"><option value="">— Selecione —</option></select></div>
    <div class="fl"><label>Disciplina</label><select id="selDisc" onchange="autoSave()"><option value="">— Selecione —</option></select></div>
    <div class="fl"><label>Série / Ano</label>
      <select id="selSerie" onchange="autoSave()">
        <optgroup label="Ens. Fund. – Anos Iniciais">
          <option>1º Ano – EF</option><option>2º Ano – EF</option><option>3º Ano – EF</option>
          <option>4º Ano – EF</option><option>5º Ano – EF</option>
        </optgroup>
        <optgroup label="Ens. Fund. – Anos Finais">
          <option>6º Ano – EF</option><option>7º Ano – EF</option>
          <option>8º Ano – EF</option><option>9º Ano – EF</option>
        </optgroup>
        <optgroup label="Ensino Médio">
          <option>1ª Série – EM</option><option>2ª Série – EM</option><option>3ª Série – EM</option>
        </optgroup>
      </select>
    </div>
    <div class="fr2">
      <div class="fl"><label>Turma</label><input id="selTurma" placeholder="Ex: A, 9B…" oninput="autoSave()"></div>
      <div class="fl"><label>Trimestre</label>
        <select id="selTrim" onchange="autoSave()">
          <option>1º Trimestre</option><option>2º Trimestre</option><option>3º Trimestre</option>
        </select>
      </div>
    </div>
    <div class="fl"><label>Data da Prova</label>
      <div class="cal-wrap">
        <button type="button" class="cal-btn" id="calBtn" onclick="toggleCal()">Selecionar data…</button>
        <div class="cal-pop" id="calPop">
          <div class="cal-nav">
            <button onclick="calNav(-1)">‹</button>
            <span class="cal-my" id="calTitle"></span>
            <button onclick="calNav(1)">›</button>
          </div>
          <div class="cal-grid" id="calGrid"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="sb-s">
    <div class="slbl">Tipo de Prova</div>
    <div class="tipo-tg" id="tipoTg">
      <button class="active" onclick="setTipoProva('efaf',this)">Fundamental (A–D)</button>
      <button onclick="setTipoProva('em',this)">Médio (A–E)</button>
    </div>
  </div>

  <div class="sb-s">
    <div class="slbl">Pontuação padrão por questão</div>
    <div class="fl"><input id="ptsDefault" type="number" value="1" min="0.1" step="0.1"></div>
    <div style="font-size:10.5px;color:var(--mu)" id="ptsSummary"></div>
  </div>

  <div class="sb-s">
    <div class="slbl">Instruções no cabeçalho</div>
    <div class="fl"><textarea id="instrucoes" rows="3" oninput="autoSave()">Sua avaliação será corrigida conforme as opções marcadas. Não rasure! Pinte a alternativa com caneta preta ou azul.</textarea></div>
  </div>

  <div class="sb-s">
    <button onclick="addQ()" style="width:100%;background:var(--ac);color:#fff;border:none;padding:8px;border-radius:6px;font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:4px">+ Adicionar Questão</button>
    <button onclick="resetAll()" style="width:100%;background:var(--bg);color:var(--mu);border:1px solid var(--br);padding:7px;border-radius:6px;font-family:'IBM Plex Sans',sans-serif;font-size:11px;cursor:pointer">🗑 Limpar Tudo</button>
  </div>

</aside>

<main class="editor">
  <div class="pts-bar no-print">
    <span>Total: <span class="ptot" id="totalPts">10,0</span> pontos</span>
    <span class="pwarn" id="ptsWarn">⚠ Soma ≠ 10,0</span>
  </div>
  <div id="qContainer"></div>
  <button class="add-btn no-print" onclick="addQ()">＋ Adicionar Questão</button>
</main>
</div>

<div class="modal-ov hidden" id="modalPreview">
  <div class="modal-box">
    <div class="modal-hd"><h2>Pré-visualização da Prova</h2><button onclick="closePreview()">✕ Fechar</button></div>
    <div class="modal-bd" id="modalBd"></div>
  </div>
</div>

<script>
// ── ESTADO ──
let tipoProva='efaf', questoes=[], qId=0, logoB64=null;
let professors=[], disciplinas=[], selectedDate=null;
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();

const LEM=['A','B','C','D','E'], LEF=['A','B','C','D'];
// Sequência padrão de valores da somatória
const SOMA_SEQ=[1,2,4,8,16,32,64];

// ── INIT ──
window.addEventListener('DOMContentLoaded',()=>{
  const disc=['Português','Matemática','Ciências','História','Geografia','Inglês','Arte','Educação Física','Biologia','Física','Química','Filosofia','Sociologia','Redação'];
  disc.forEach(d=>addDiscItem(d));
  for(let i=0;i<10;i++) addQ(i<2?'discursiva':'multipla');
  renderCal(); updatePts();
  document.addEventListener('click',e=>{
    if(!e.target.closest('.cal-wrap')) document.getElementById('calPop').classList.remove('open');
  });
});

// ── LOGO ──
function loadLogo(inp){
  if(!inp.files[0])return;
  const r=new FileReader();
  r.onload=e=>{
    logoB64=e.target.result;
    const img=document.getElementById('logoImg');
    img.src=logoB64; img.style.display='block';
    document.getElementById('logoHint').style.display='none';
  };
  r.readAsDataURL(inp.files[0]);
}

// ── PROFESSORES ──
function addProf(){
  const inp=document.getElementById('profNovo');
  const v=inp.value.trim(); if(!v)return;
  if(professors.includes(v)){inp.value='';return;}
  professors.push(v); inp.value='';
  renderProfList(); renderProfSelect();
}
function delProf(i){ professors.splice(i,1); renderProfList(); renderProfSelect(); }
function renderProfList(){
  document.getElementById('profList').innerHTML=professors.map((p,i)=>
    `<div class="cad-item"><span>${p}</span><button class="cad-del" onclick="delProf(${i})">✕</button></div>`
  ).join('');
}
function renderProfSelect(){
  const sel=document.getElementById('selProf');
  const cur=sel.value;
  sel.innerHTML='<option value="">— Selecione —</option>'+professors.map(p=>`<option value="${p}">${p}</option>`).join('');
  if(professors.includes(cur)) sel.value=cur;
}

// ── DISCIPLINAS ──
function addDisc(){
  const inp=document.getElementById('discNova');
  const v=inp.value.trim(); if(!v)return;
  if(disciplinas.includes(v)){inp.value='';return;}
  addDiscItem(v); inp.value='';
}
function addDiscItem(v){

}
function delDisc(i){ disciplinas.splice(i,1); renderDiscList(); renderDiscSelect(); }
function renderDiscList(){

    `<div class="cad-item"><span>${d}</span><button class="cad-del" onclick="delDisc(${i})">✕</button></div>`

}
function renderDiscSelect(){

// ── CALENDÁRIO ──
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIAS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
function toggleCal(){ document.getElementById('calPop').classList.toggle('open'); }
function calNav(d){ calMonth+=d; if(calMonth>11){calMonth=0;calYear++;}else if(calMonth<0){calMonth=11;calYear--;} renderCal(); }
function renderCal(){
  document.getElementById('calTitle').textContent=`${MESES[calMonth]} ${calYear}`;
  const grid=document.getElementById('calGrid');
  grid.innerHTML=DIAS.map(d=>`<div class="cal-lbl">${d}</div>`).join('');
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  for(let i=first-1;i>=0;i--){
    grid.innerHTML+=`<div class="cal-d other-m">${prevDays-i}</div>`;
  }
  for(let d=1;d<=days;d++){
    const isSel=selectedDate&&selectedDate.y===calYear&&selectedDate.m===calMonth&&selectedDate.d===d;
    const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    let cls='cal-d';
    if(isSel) cls+=' sel';
    else if(isToday) cls+=' today';
    grid.innerHTML+=`<div class="${cls}" onclick="pickDate(${d})">${d}</div>`;
  }
}
function pickDate(d){
  selectedDate={y:calYear,m:calMonth,d};
  const dd=String(d).padStart(2,'0');
  const mm=String(calMonth+1).padStart(2,'0');
  document.getElementById('calBtn').textContent=`${dd}/${mm}/${calYear}`;
  document.getElementById('calPop').classList.remove('open');
  renderCal();
}

function setTipoProva(t,btn){

  btn.classList.add('active');

// ── QUESTÕES ──
function addQ(tipo){
  tipo=tipo||'multipla';
  const letras=tipoProva==='em'?[...LEM]:[...LEF];
  const q={
    id:++qId, tipo,
    distrator:'', imagem:null, consigna:'', enunciado:'',
    pts:parseFloat(document.getElementById('ptsDefault').value)||1,
    alternativas:letras.map((l,i)=>({letra:l,texto:'',correta:i===0})),
    // Somatória começa com os 4 primeiros valores: 01, 02, 04, 08
    somatoria:[
      {v:1,txt:'',ok:false},
      {v:2,txt:'',ok:false},
      {v:4,txt:'',ok:false},
      {v:8,txt:'',ok:false}
    ],
    linhas:4
  };
  questoes.push(q);
  renderQ(q);
  updatePts();
}

function delQ(id){
  if(questoes.length<=1){alert('A prova precisa ter ao menos 1 questão.');return;}
  if(!confirm('Remover esta questão?'))return;
  questoes=questoes.filter(q=>q.id!==id);
  renderAll(); updatePts();
}

function moveQ(id,dir){
  const i=questoes.findIndex(q=>q.id===id);
  const ni=i+dir;
  if(ni<0||ni>=questoes.length)return;
  [questoes[i],questoes[ni]]=[questoes[ni],questoes[i]];
  renderAll();
}

function dupQ(id){
  const q=questoes.find(q=>q.id===id);
  if(!q)return;
  const nq=JSON.parse(JSON.stringify(q));
  nq.id=++qId;
  const i=questoes.findIndex(q=>q.id===id);
  questoes.splice(i+1,0,nq);
  renderAll(); updatePts();
}

function setTipoQ(id,tipo){
  const q=questoes.find(q=>q.id===id);
  if(!q)return;
  q.tipo=tipo;
  if(tipo==='multipla'){
    const letras=tipoProva==='em'?[...LEM]:[...LEF];
    q.alternativas=letras.map((l,i)=>({letra:l,texto:q.alternativas[i]?q.alternativas[i].texto:'',correta:i===0}));
  }
  renderAll();
}

// ── SOMATÓRIA: adicionar / remover itens ──
function addSomatItem(id){
  const q=questoes.find(q=>q.id===id);
  if(!q)return;
  const used=q.somatoria.map(s=>s.v);
  // Próximo valor da sequência não usado
  const next=SOMA_SEQ.find(v=>!used.includes(v));
  if(!next){alert('Todos os valores da sequência (01→64) já foram adicionados.');return;}
  q.somatoria.push({v:next,txt:'',ok:false});
  // Reordenar pela sequência
  q.somatoria.sort((a,b)=>SOMA_SEQ.indexOf(a.v)-SOMA_SEQ.indexOf(b.v));
  renderAll();
}

function remSomatItem(id){
  const q=questoes.find(q=>q.id===id);
  if(!q)return;
  if(q.somatoria.length<=1){alert('A somatória precisa de pelo menos 1 item.');return;}
  q.somatoria.pop();
  renderAll();
}

function renderAll(){
  document.getElementById('qContainer').innerHTML='';
  questoes.forEach(q=>renderQ(q));
}

function renderQ(q){
  const cont=document.getElementById('qContainer');
  const num=questoes.indexOf(q)+1;
  const numStr=String(num).padStart(2,'0');
  const letras=tipoProva==='em'?[...LEM]:[...LEF];
  if(q.tipo==='multipla'&&q.alternativas.length!==letras.length){
    q.alternativas=letras.map((l,i)=>({letra:l,texto:q.alternativas[i]?q.alternativas[i].texto:'',correta:i===0}));
  }
  const div=document.createElement('div');
  div.className='qw'; div.id='qw-'+q.id;

  const imgHTML=q.imagem
    ?`<img src="${q.imagem}"><br><button class="img-rm" onclick="event.stopPropagation();rmImg(${q.id})">✕ Remover imagem</button>`
    :'<p>📷 Clique para adicionar imagem (opcional)</p>';

  // ── ÁREA DO TIPO ──
  let tipoArea='';
  if(q.tipo==='multipla'){
    tipoArea=`<div class="qf"><label>Alternativas <span style="color:var(--mu);font-weight:400;font-size:9px;">(marque o gabarito)</span></label>
    <div class="alts">${q.alternativas.map((a,i)=>`
      <div class="alt-row">
        <span class="alt-l">${a.letra})</span>
        <input class="alt-in" type="text" value="${esc(a.texto)}" placeholder="Alternativa ${a.letra}…" oninput="setAlt(${q.id},${i},this.value)">
        <input type="radio" class="alt-radio" name="gab-${q.id}" ${a.correta?'checked':''} onchange="setAltOk(${q.id},${i})">
        <span class="alt-rl">Gabarito</span>
      </div>`).join('')}
    </div></div>`;
  } else if(q.tipo==='somatoria'){
    const soma=q.somatoria.filter(s=>s.ok).reduce((a,s)=>a+s.v,0);
    const canAdd=q.somatoria.length < SOMA_SEQ.length;
    const canRem=q.somatoria.length > 1;
    tipoArea=`<div class="qf"><label>Itens da Somatória <span style="color:var(--mu);font-weight:400;font-size:9px;">(marque os corretos)</span></label>
    <div class="somat">${q.somatoria.map((s,i)=>`
      <div class="somat-r">
        <span class="somat-v">(${String(s.v).padStart(2,'0')})</span>
        <input class="somat-in" type="text" value="${esc(s.txt)}" placeholder="Afirmativa ${String(s.v).padStart(2,'0')}…" oninput="setSomat(${q.id},${i},'txt',this.value)">
        <input type="checkbox" class="somat-cb" ${s.ok?'checked':''} onchange="setSomat(${q.id},${i},'ok',this.checked)">
        <span class="alt-rl">✓</span>
      </div>`).join('')}
    </div>
    <div class="somat-hint" id="somat-hint-${q.id}">Gabarito da somatória: <strong>${soma||'—'}</strong></div>
    <div class="somat-btns">
      <button class="somat-add" onclick="addSomatItem(${q.id})" ${canAdd?'':'disabled'} title="Adicionar próximo valor (${canAdd?SOMA_SEQ.find(v=>!q.somatoria.map(s=>s.v).includes(v)):'—'})">+ Adicionar item</button>
      <button class="somat-rem" onclick="remSomatItem(${q.id})" ${canRem?'':'disabled'}>− Remover último</button>
    </div>
    </div>`;
  } else {
    tipoArea=`<div class="qf"><label>Linhas para resposta discursiva</label>
    <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
      <input type="number" value="${q.linhas}" min="1" max="20" style="width:60px;font-family:'IBM Plex Sans',sans-serif;font-size:12px;border:1px solid var(--br);border-radius:5px;padding:4px 7px;" oninput="setF(${q.id},'linhas',parseInt(this.value)||4)">
      <span style="font-size:11px;color:var(--mu);">linhas em branco (espaçamento 1,5)</span>
    </div></div>`;
  }

  // ── HTML DA QUESTÃO ──
  // ORDEM: cabeçalho → distrator → imagem → consigna → enunciado → tipo-específico
  div.innerHTML=`
  <div class="qtop">
    <span class="qnum">QUESTÃO ${numStr}</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:11px;color:var(--mu);">
        <input type="number" class="pts-in" value="${q.pts}" min="0.1" step="0.1" onchange="setF(${q.id},'pts',parseFloat(this.value)||1);updatePts()"> pts
      </span>
      <div class="qctrl">
        <button class="qb mv" onclick="moveQ(${q.id},-1)" title="Mover para cima">↑</button>
        <button class="qb mv" onclick="moveQ(${q.id},1)" title="Mover para baixo">↓</button>
        <button class="qb" onclick="dupQ(${q.id})">⧉ Dup</button>
        <button class="qb del" onclick="delQ(${q.id})">✕ Remover</button>
      </div>
    </div>
  </div>

  <div class="qtipo">
    <span>Tipo:</span>
    <button class="qtbtn ${q.tipo==='multipla'?'active':''}" onclick="setTipoQ(${q.id},'multipla')">Múltipla Escolha</button>
    <button class="qtbtn ${q.tipo==='somatoria'?'active':''}" onclick="setTipoQ(${q.id},'somatoria')">Somatória</button>
    <button class="qtbtn ${q.tipo==='discursiva'?'active':''}" onclick="setTipoQ(${q.id},'discursiva')">Discursiva</button>
  </div>

  <!-- 1. TEXTO DISTRATOR -->
  <div class="qf">
    <label>① Texto Distrator (opcional)</label>
    <textarea placeholder="Cole aqui o texto base, trecho, tabela ou poema que serve de suporte para a questão…" oninput="setF(${q.id},'distrator',this.value)">${q.distrator||''}</textarea>
  </div>

  <!-- 2. IMAGEM -->
  <div class="qf">
    <label>② Imagem (opcional)</label>
    <div class="imgdrop" onclick="document.getElementById('qi-${q.id}').click()">
      <input type="file" id="qi-${q.id}" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;" onchange="setImg(${q.id},this)">
      ${imgHTML}
    </div>
  </div>

  <!-- 3. CONSIGNA -->
  <div class="qf">
    <label>③ Consigna / instrução (opcional)</label>
    <input type="text" value="${esc(q.consigna||'')}" placeholder="Ex: Assinale a alternativa correta." oninput="setF(${q.id},'consigna',this.value)">
  </div>

  <!-- 4. ENUNCIADO -->
  <div class="qf">
    <label>④ Enunciado da Questão *</label>
    <textarea rows="3" placeholder="Digite o enunciado completo da questão…" oninput="setF(${q.id},'enunciado',this.value)">${q.enunciado||''}</textarea>
  </div>

  <!-- 5. ALTERNATIVAS / LINHAS / SOMATÓRIA -->
  ${tipoArea}`;

  cont.appendChild(div);
}

// ── HELPERS ──
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function setF(id,f,v){ const q=questoes.find(q=>q.id===id); if(q) q[f]=v; }
function setAlt(id,i,v){ const q=questoes.find(q=>q.id===id); if(q) q.alternativas[i].texto=v; }
function setAltOk(id,i){ const q=questoes.find(q=>q.id===id); if(!q)return; q.alternativas.forEach((a,j)=>a.correta=j===i); }
function setSomat(id,i,f,v){
  const q=questoes.find(q=>q.id===id); if(!q)return;
  q.somatoria[i][f]=v;
  const soma=q.somatoria.filter(s=>s.ok).reduce((a,s)=>a+s.v,0);
  const hint=document.getElementById(`somat-hint-${id}`);
  if(hint) hint.innerHTML=`Gabarito da somatória: <strong>${soma||'—'}</strong>`;
}
function setImg(id,inp){
  if(!inp.files[0])return;
  const r=new FileReader();
  r.onload=e=>{ const q=questoes.find(q=>q.id===id); if(q){ q.imagem=e.target.result; renderAll(); }};
  r.readAsDataURL(inp.files[0]);
}
function rmImg(id){ const q=questoes.find(q=>q.id===id); if(q){ q.imagem=null; renderAll(); }}
function updatePts(){
  const tot=questoes.reduce((a,q)=>a+(parseFloat(q.pts)||0),0);
  document.getElementById('totalPts').textContent=tot.toFixed(1).replace('.',',');
  const warn=document.getElementById('ptsWarn');
  warn.style.display=Math.abs(tot-10)>0.01?'':'none';
  document.getElementById('ptsSummary').textContent=`${questoes.length} questão(ões) · Total ${tot.toFixed(1)} pts`;
}
function resetAll(){
  if(!confirm('Apagar tudo e recomeçar?'))return;
  questoes=[]; qId=0;
  document.getElementById('qContainer').innerHTML='';
  for(let i=0;i<10;i++) addQ(i<2?'discursiva':'multipla');
  updatePts();
}

    }

    // Separador entre questões
    qsHtml+=`<div style="border-bottom:1px dashed #ddd;margin-top:12px;"></div>`;
    qsHtml+=`</div>`;
  });

  return wrap+qsHtml;
}

// ── EXPORT PDF ──
async function exportPDF(){
  const btnExp=document.getElementById('btnExport');
  if(btnExp){btnExp.disabled=true;btnExp.textContent='⏳ Gerando PDF…';}
  try{
    const printDiv=document.createElement('div');
    printDiv.style.cssText='position:absolute;left:-9999px;top:0;width:190mm;padding:10mm;background:white;';
    printDiv.innerHTML=buildHTML();
    document.body.appendChild(printDiv);
    const images=printDiv.querySelectorAll('img');
    await Promise.all(Array.from(images).map(img=>{
      if(img.complete)return Promise.resolve();
      return new Promise(resolve=>{img.onload=resolve;img.onerror=resolve;});
    }));
    const canvas=await html2canvas(printDiv,{scale:2,backgroundColor:'#ffffff',logging:false,useCORS:true});
    document.body.removeChild(printDiv);
    const {jsPDF}=window.jspdf;
    const imgData=canvas.toDataURL('image/png');
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const imgWidth=190, pageHeight=277;
    const imgHeight=(canvas.height*imgWidth)/canvas.width;
    let heightLeft=imgHeight, position=0;
    pdf.addImage(imgData,'PNG',10,10,imgWidth,imgHeight);
    heightLeft-=pageHeight;
    while(heightLeft>0){
      position=heightLeft-imgHeight;
      pdf.addPage();
      pdf.addImage(imgData,'PNG',10,position,imgWidth,imgHeight);
      heightLeft-=pageHeight;
    }
    const nomeEscola=document.getElementById('nomeEscola').value||'prova';
    pdf.save(`${nomeEscola.replace(/\s+/g,'_')}.pdf`);
  }catch(err){
    console.error('Erro ao gerar PDF:',err);
    alert('Erro ao gerar PDF:\n'+err.message+'\n\nTente usar Imprimir (Ctrl+P) e salvar como PDF.');
  }finally{
    if(btnExp){btnExp.disabled=false;btnExp.textContent='📄 Exportar PDF';}
  }
}

// ── EXPORT DOCX ──
async function exportDOCX(){
  const btnDocx=document.getElementById('btnDocx');
  if(btnDocx){btnDocx.disabled=true;btnDocx.textContent='⏳ Gerando DOCX…';}
  try{
    const docxLib = window.docx || docx;
    const {
      Document,Packer,Paragraph,TextRun,Table,TableRow,TableCell,
      AlignmentType,BorderStyle,WidthType,ShadingType,VerticalAlign
    }=docxLib;
    const escola=document.getElementById('nomeEscola').value||'';
    const cidade=document.getElementById('cidadeEscola').value||'';
    const titulo=document.getElementById('tituloAval').value||'AVALIAÇÃO';
    const prof=document.getElementById('selProf').value||'';
    const disc=document.getElementById('selDisc').value||'';
    const serie=document.getElementById('selSerie').value||'';
    const turma=document.getElementById('selTurma').value||'';
    const trimVal=document.getElementById('selTrim').value||'';
    const instrText=document.getElementById('instrucoes').value||'';
    const dataStr=document.getElementById('calBtn').textContent.trim();
    const dataFmt=dataStr==='Selecionar data\u2026'?'___/___/____':dataStr;
    const letras=tipoProva==='em'?['A','B','C','D','E']:['A','B','C','D'];

    const bdr={style:BorderStyle.SINGLE,size:4,color:'333333'};
    const bdrAll={top:bdr,bottom:bdr,left:bdr,right:bdr};
    const bdrN={style:BorderStyle.NONE,size:0,color:'FFFFFF'};
    const noBdr={top:bdrN,bottom:bdrN,left:bdrN,right:bdrN};

    function txt(text,o){o=o||{};return new TextRun({text:String(text||''),font:'Arial',size:o.size!=null?o.size:20,bold:o.bold!=null?o.bold:false,italics:o.it!=null?o.it:false,color:o.color!=null?o.color:'000000'});}
    function para(runs,o){o=o||{};return new Paragraph({alignment:o.align!=null?o.align:AlignmentType.LEFT,spacing:{before:o.before||0,after:o.after||0},indent:o.indent?{left:o.indent}:undefined,children:Array.isArray(runs)?runs:[runs]});}
    function cell(children,o){o=o||{};return new TableCell({borders:o.borders!=null?o.borders:bdrAll,width:o.w?{size:o.w,type:WidthType.DXA}:undefined,columnSpan:o.span,rowSpan:o.rows,verticalAlign:o.vAlign!=null?o.vAlign:VerticalAlign.CENTER,shading:o.shade?{fill:o.shade,type:ShadingType.CLEAR}:undefined,margins:{top:o.mt||60,bottom:o.mb||60,left:o.ml||80,right:o.mr||80},children:Array.isArray(children)?children:[children]});}

    const colNW=480,colLW=350;
    const gabW=colNW+(letras.length+1)*colLW;
    const cabW=9638-gabW;

    // Gabarito
    var gabRows=[];
    var gabHdrCells=[cell(para([txt('Nº',{bold:true,size:16})],{align:AlignmentType.CENTER}),{w:colNW,shade:'E8E8E8'})];
    letras.forEach(function(l){gabHdrCells.push(cell(para([txt(l,{bold:true,size:16})],{align:AlignmentType.CENTER}),{w:colLW,shade:'E8E8E8'}));});
    gabHdrCells.push(cell(para([txt('\u2713',{bold:true,size:14})],{align:AlignmentType.CENTER}),{w:colLW,shade:'E8E8E8'}));
    gabRows.push(gabHdrCells);
    questoes.forEach(function(q,i){
      var shade=i%2===0?'F5F5F5':'FFFFFF';
      var correta=q.tipo==='multipla'?q.alternativas.find(function(a){return a.correta;}):null;
      var row=[cell(para([txt(String(i+1),{bold:true,size:16})],{align:AlignmentType.CENTER}),{w:colNW,shade:shade})];
      if(q.tipo==='discursiva'){
        row.push(cell(para([txt('Discursiva',{size:13,it:true})],{align:AlignmentType.CENTER}),{span:letras.length+1,shade:shade}));
      } else if(q.tipo==='somatoria'){
        var soma=q.somatoria.filter(function(s){return s.ok;}).reduce(function(a,s){return a+s.v;},0);
        row.push(cell(para([txt('= '+(soma||'\u2014'),{bold:true,size:14})],{align:AlignmentType.CENTER}),{span:letras.length+1,shade:shade}));
      } else {
        letras.forEach(function(l){
          var isOk=correta&&correta.letra===l;
          row.push(cell(para([txt(l,{bold:isOk,size:16,color:isOk?'166534':'000000'})],{align:AlignmentType.CENTER}),{w:colLW,shade:shade}));
        });
        row.push(cell(para([txt('')]),{w:colLW,shade:shade}));
      }
      gabRows.push(row);
    });

    // Cabeçalho da tabela
    var cabRows=[
      new TableRow({children:[cell(para([txt(escola,{bold:true,size:24})],{align:AlignmentType.CENTER}),{w:cabW})]}),
      new TableRow({children:[cell(para([txt(cidade,{size:18})],{align:AlignmentType.CENTER}),{w:cabW})]}),
      new TableRow({children:[cell(para([txt(titulo,{bold:true,size:22})],{align:AlignmentType.CENTER}),{w:cabW})]}),
      new TableRow({children:[cell(para([txt('Professor(a): ',{bold:true,size:19}),txt(prof||'________________________',{size:19}),txt('    Disciplina: ',{bold:true,size:19}),txt(disc||'____________',{size:19})]),{w:cabW})]}),
      new TableRow({children:[cell(para([txt('Aluno(a): _______________________________  ',{size:19}),txt('Série: ',{bold:true,size:19}),txt(serie+'  ',{size:19}),txt('Turma: ',{bold:true,size:19}),txt((turma||'___')+'  ',{size:19}),txt('Trim.: ',{bold:true,size:19}),txt(trimVal+'  ',{size:19}),txt('Data: ',{bold:true,size:19}),txt(dataFmt,{size:19})]),{w:cabW})]}),
      new TableRow({children:[cell(para([txt('Assinatura do responsável: _______________________   Data: ___/___/___',{size:19})]),{w:cabW})]}),
      new TableRow({children:[cell(para([txt(instrText,{size:18,it:true})]),{w:cabW})]}),
    ];
    var cabTable=new Table({width:{size:cabW,type:WidthType.DXA},columnWidths:[cabW],rows:cabRows});
    var gabColWidths=[colNW].concat(letras.map(function(){return colLW;})).concat([colLW]);
    var gabTableRows=gabRows.map(function(cells){return new TableRow({children:cells});});
    var gabTable=new Table({width:{size:gabW,type:WidthType.DXA},columnWidths:gabColWidths,rows:gabTableRows});
    var wrapTable=new Table({width:{size:9638,type:WidthType.DXA},columnWidths:[cabW,gabW],rows:[new TableRow({children:[
      new TableCell({borders:noBdr,width:{size:cabW,type:WidthType.DXA},verticalAlign:VerticalAlign.TOP,margins:{top:0,bottom:0,left:0,right:60},children:[cabTable]}),
      new TableCell({borders:noBdr,width:{size:gabW,type:WidthType.DXA},verticalAlign:VerticalAlign.TOP,margins:{top:0,bottom:0,left:0,right:0},children:[gabTable]}),
    ]})]});

    // ── QUESTÕES DOCX (mesma ordem: cabeçalho → distrator → imagem → consigna → enunciado → tipo) ──
    var qChildren=[new Paragraph({spacing:{before:200,after:0},children:[txt('')]})];
    questoes.forEach(function(q,i){
      var num=i+1;
      var numStr=String(num).padStart(2,'0');
      var pts=q.pts.toFixed(1).replace('.',',');

      // 1. QUESTÃO XX (pts)
      qChildren.push(para([
        txt('QUESTÃO '+numStr+' ',{bold:true,size:22}),
        txt('('+pts+' pts)',{size:18,color:'555555'}),
      ],{before:160,after:60}));

      // 2. Distrator
      if(q.distrator&&q.distrator.trim()){
        q.distrator.split('\n').forEach(function(line){
          qChildren.push(para([txt(line,{size:19,it:true,color:'444444'})],{before:40,after:0,indent:360}));
        });
        qChildren.push(new Paragraph({spacing:{before:40},children:[txt('')]}));
      }

      // 3. Consigna
      if(q.consigna&&q.consigna.trim()){
        qChildren.push(para([txt(q.consigna,{size:19,it:true,color:'333333'})],{before:40,after:40}));
      }

      // 4. Enunciado
      qChildren.push(para([txt(q.enunciado||'[sem enunciado]',{size:21})],{before:40,after:60}));

      // 5. Tipo específico
      if(q.tipo==='multipla'){
        q.alternativas.forEach(function(a){
          if(!a.texto.trim())return;
          qChildren.push(para([txt(a.letra+') ',{bold:true,size:20}),txt(a.texto,{size:20})],{before:30,after:0,indent:360}));
        });
      } else if(q.tipo==='somatoria'){
        qChildren.push(para([txt('Some os valores das afirmativas VERDADEIRAS.',{size:17,it:true,color:'555555'})],{before:30,after:30}));
        q.somatoria.forEach(function(s){
          if(!s.txt.trim())return;
          qChildren.push(para([
            txt('('+String(s.v).padStart(2,'0')+') ',{bold:true,size:20,color:'92400e'}),
            txt(s.txt,{size:20}),
          ],{before:30,after:0,indent:360}));
        });
      } else {
        for(var l=0;l<(q.linhas||4);l++){
          qChildren.push(new Paragraph({
            spacing:{before:40,after:0},
            border:{bottom:{style:BorderStyle.SINGLE,size:4,color:'999999'}},
            children:[txt('')],
          }));
        }
      }
      qChildren.push(new Paragraph({
        spacing:{before:80,after:0},
        border:{bottom:{style:BorderStyle.SINGLE,size:2,color:'E0E0E0'}},
        children:[txt('')],
      }));
    });

    var doc=new Document({sections:[{properties:{page:{size:{width:11906,height:16838},margin:{top:1134,right:1134,bottom:1134,left:1134}}},children:[wrapTable].concat(qChildren)}]});
    var base64=await Packer.toBase64String(doc);
    var binary=atob(base64);
    var bytes=new Uint8Array(binary.length);
    for(var b=0;b<binary.length;b++) bytes[b]=binary.charCodeAt(b);
    var blob=new Blob([bytes],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download=(escola.replace(/\s+/g,'_')||'prova')+'.docx';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }catch(err){
    console.error('Erro ao gerar DOCX:',err);
    alert('Erro ao gerar DOCX:\n'+err.message);
  }finally{
    var btn2=document.getElementById('btnDocx');
    if(btn2){btn2.disabled=false;btn2.textContent='\uD83D\uDCDD Exportar DOCX';}
  }
}
</script>
